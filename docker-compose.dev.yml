services:

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    container_name: matchmind_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-matchmind_db}
      POSTGRES_USER: ${DB_USER:-matchmind_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-matchmind@pwd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-matchmind_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis (Cache + Celery Broker)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: matchmind_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Weaviate (Optional Vector Context Store)
  # ─────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.25.5
    container_name: matchmind_weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate

  # ─────────────────────────────────────────────
  # Django Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchmind_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./ml/artifacts:/app/ml_engine/artifacts
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Celery Worker (async tasks)
  # ─────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchmind_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─────────────────────────────────────────────
  # Celery Beat (scheduled tasks)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchmind_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─────────────────────────────────────────────
  # Angular Frontend (dev)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: matchmind_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  weaviate_data:
