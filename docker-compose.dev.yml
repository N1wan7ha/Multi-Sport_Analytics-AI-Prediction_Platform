version: '3.9'

services:

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cricket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cricket_analytics}
      POSTGRES_USER: ${DB_USER:-cricket_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cricket_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cricket_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis (Cache + Celery Broker)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cricket_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Django Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cricket_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./ml/artifacts:/app/ml_engine/artifacts
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Celery Worker (async tasks)
  # ─────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cricket_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─────────────────────────────────────────────
  # Celery Beat (scheduled tasks)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cricket_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─────────────────────────────────────────────
  # Angular Frontend (dev)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cricket_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
