name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pip-audit
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pip-audit
          pip-audit --progress-spinner off || echo "::warning::pip-audit found vulnerabilities; upgrade dependencies to resolve."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities; upgrade dependencies to resolve."
