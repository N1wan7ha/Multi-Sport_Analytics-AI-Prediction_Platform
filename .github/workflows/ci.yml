name: MatchMind CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint (Backend + Frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt && pip install flake8

      - name: Run flake8
        working-directory: backend
        run: flake8 . --exclude migrations,__pycache__ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint if configured
        working-directory: frontend
        run: npm run lint --if-present

  test:
    name: Test (Backend + Frontend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: matchmind_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Django system check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DB_HOST: localhost
          DB_NAME: matchmind_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DB_HOST: localhost
          DB_NAME: matchmind_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: python manage.py migrate

      - name: Run pytest
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: pytest --tb=short -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Angular tests (headless)
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless

  build:
    name: Build Images + Compose Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t cricket-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t cricket-frontend:latest -f ./frontend/Dockerfile.prod ./frontend

      - name: Validate production compose file
        run: docker compose -f docker-compose.prod.yml config

  deploy:
    name: Deploy (Optional)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deployment placeholder
        run: |
          echo "Configure SSH/host secrets to enable automated deployment."
          echo "Expected command on target host: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
