name: MatchMind CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cricket_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Django system check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DB_HOST: localhost
          DB_NAME: cricket_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
          DB_HOST: localhost
          DB_NAME: cricket_test
          DB_USER: test_user
          DB_PASSWORD: test_password
        run: python manage.py migrate

      - name: Run pytest
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.dev
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Angular)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Angular lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build Angular (production)
        working-directory: frontend
        run: npm run build -- --configuration=production

  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t cricket-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t cricket-frontend:latest -f ./frontend/Dockerfile.dev ./frontend
