<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Players • Cricket Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Cricket Dashboard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="matches.html">Matches</a></li>
          <li class="nav-item"><a class="nav-link" href="series.html">Series</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="players.html">Players</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
      <div>
        <h1 class="h3 mb-1">Players</h1>
        <div class="text-body-secondary">Powered by CricAPI players + players_info</div>
      </div>
      <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <label class="form-label">Search players</label>
        <input id="playerSearch" class="form-control" placeholder="Virat, Babar, Perry…" />
        <div class="form-text">Tip: Use short search terms for faster results.</div>
      </div>
    </div>

    <div id="statusBar" class="alert alert-info d-none" role="alert"></div>

    <div id="playersList" class="list-group"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../app/pages/players.js"></script>
</body>
</html>
