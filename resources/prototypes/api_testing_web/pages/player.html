<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player • Cricket Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Cricket Dashboard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="matches.html">Matches</a></li>
          <li class="nav-item"><a class="nav-link" href="series.html">Series</a></li>
          <li class="nav-item"><a class="nav-link" href="players.html">Players</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
      <div>
        <h1 id="playerName" class="h3 mb-1">Player</h1>
        <div id="playerMeta" class="text-body-secondary"></div>
      </div>
      <a class="btn btn-outline-secondary" href="players.html">Back to players</a>
    </div>

    <div id="statusBar" class="alert alert-info d-none" role="alert"></div>

    <div id="playerCard" class="card d-none">
      <div class="card-body">
        <dl class="row mb-0">
          <dt class="col-sm-3">Country</dt><dd class="col-sm-9" id="country"></dd>
          <dt class="col-sm-3">Role</dt><dd class="col-sm-9" id="role"></dd>
          <dt class="col-sm-3">Batting</dt><dd class="col-sm-9" id="battingStyle"></dd>
          <dt class="col-sm-3">Bowling</dt><dd class="col-sm-9" id="bowlingStyle"></dd>
          <dt class="col-sm-3">DOB</dt><dd class="col-sm-9" id="dob"></dd>
          <dt class="col-sm-3">Place of birth</dt><dd class="col-sm-9" id="placeOfBirth"></dd>
        </dl>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../app/pages/player.js"></script>
</body>
</html>
