<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matches • Cricket Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Cricket Dashboard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="matches.html">Matches</a></li>
          <li class="nav-item"><a class="nav-link" href="series.html">Series</a></li>
          <li class="nav-item"><a class="nav-link" href="players.html">Players</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
      <div>
        <h1 class="h3 mb-1">Matches</h1>
        <div class="text-body-secondary">Merged from Cricbuzz (RapidAPI) + CricAPI (CricketData)</div>
      </div>
      <button id="refreshBtn" class="btn btn-primary">Refresh</button>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2">
          <div class="col-12 col-md-3">
            <label class="form-label">Category</label>
            <select id="categoryFilter" class="form-select">
              <option value="all" selected>All</option>
              <option value="international">International</option>
              <option value="franchise">Franchise/League</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">Gender</label>
            <select id="genderFilter" class="form-select">
              <option value="all" selected>All</option>
              <option value="men">Men</option>
              <option value="women">Women</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">Format</label>
            <select id="formatFilter" class="form-select">
              <option value="all" selected>All</option>
              <option value="test">Test</option>
              <option value="odi">ODI</option>
              <option value="t20">T20</option>
              <option value="t10">T10</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">Status</label>
            <select id="statusFilter" class="form-select">
              <option value="all" selected>All</option>
              <option value="live">Live</option>
              <option value="upcoming">Upcoming</option>
              <option value="complete">Complete</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Search</label>
            <input id="searchInput" class="form-control" placeholder="Team / series / venue…" />
          </div>
        </div>
      </div>
    </div>

    <div id="statusBar" class="alert alert-info d-none" role="alert"></div>

    <div id="matchesList" class="vstack gap-2"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../app/pages/matches.js"></script>
</body>
</html>
